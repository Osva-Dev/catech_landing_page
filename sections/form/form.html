<section class="contact" id="contacto">
  <div class="contact__wrapper">
    <div class="contact__content">
      <h2 class="contact__title">
        Comienza tu proyecto digital,<br />
        <strong>agenda una consulta gratuita</strong>
      </h2>

      <div class="contact__paragraph">
        <p>La oportunidad de crecer tu negocio está en este formulario.</p>
      </div>
    </div>

    <form id="contact-form" class="contact__form">
      <input
        type="text"
        name="name"
        placeholder="Nombre completo"
        required
        class="form__input"
      />

      <input
        type="email"
        name="email"
        placeholder="Correo electrónico"
        required
        class="form__input"
      />

      <input
        type="tel"
        name="phone"
        placeholder="Número telefónico"
        class="form__input"
      />

      <button type="submit" class="form__button">Continuar</button>

      <p class="form__privacy">
        Tus datos serán utilizados únicamente para contactarte sobre tu
        solicitud.
      </p>
    </form>
  </div>
</section>
