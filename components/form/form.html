<section
  class="contact container"
  id="contacto"
  role="region"
  aria-label="Contacto"
>
  <header class="section-header">
    <h2 class="section-header__title">Agenda tu asesoría gratuita</h2>
    <p class="section-header__subtitle">
      Completa el formulario y nos pondremos en contacto en 24–48 horas hábiles.
    </p>
  </header>

  <form class="form" action="/enviar-solicitud" method="post" novalidate>
    <div class="form__row">
      <label class="form__label" for="name">Nombre completo</label>
      <input
        id="name"
        name="name"
        class="form__input"
        type="text"
        placeholder="Tu nombre"
        required
      />
    </div>

    <div class="form__row">
      <label class="form__label" for="email">Correo electrónico</label>
      <input
        id="email"
        name="email"
        class="form__input"
        type="email"
        placeholder="tu@correo.com"
        required
      />
    </div>

    <div class="form__row">
      <label class="form__label" for="company">Empresa (opcional)</label>
      <input
        id="company"
        name="company"
        class="form__input"
        type="text"
        placeholder="Nombre de la empresa"
      />
    </div>

    <div class="form__row">
      <label class="form__label" for="message"
        >Cuéntanos sobre tu proyecto</label
      >
      <textarea
        id="message"
        name="message"
        class="form__textarea"
        rows="5"
        placeholder="¿Qué necesitas?"
      ></textarea>
    </div>

    <div class="form__actions">
      <button class="button button--primary" type="submit">
        Enviar solicitud
      </button>
      <p class="form__privacy">
        Al enviar aceptas que tratemos tus datos para gestionar la solicitud.
        <a href="/politica-privacidad">Política de privacidad</a>.
      </p>
    </div>
  </form>
</section>
